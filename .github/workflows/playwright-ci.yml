name: 🎭 Playwright E2E Tests - SelempangKu

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Jalankan monitoring setiap hari pukul 08:00 WIB (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:  # Bisa dijalankan manual

jobs:
  # ============================================================
  # JOB 1: BUILD TEST
  # ============================================================
  build-test:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: selempangku/package-lock.json

      - name: Install dependencies
        working-directory: selempangku
        run: npm ci

      - name: Build project
        working-directory: selempangku
        run: npm run build --if-present

  # ============================================================
  # JOB 2: PLAYWRIGHT E2E TESTS
  # ============================================================
  playwright-tests:
    name: 🎭 Playwright E2E
    runs-on: ubuntu-latest
    needs: build-test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & test dependencies
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Create test directories
        run: mkdir -p tests/screenshots

      - name: Run Playwright tests
        run: npx playwright test tests/selempangku.spec.js --reporter=html
        env:
          BASE_URL: https://r4hid2307.alwaysdata.net
          CI: true

      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: tests/screenshots/
          retention-days: 30

  # ============================================================
  # JOB 3: MONITORING / UPTIME CHECK
  # ============================================================
  site-monitoring:
    name: 🔍 Site Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run monitoring tests
        run: |
          npx playwright test tests/selempangku.spec.js \
            --grep "Smoke Test" \
            --reporter=line
        env:
          BASE_URL: https://r4hid2307.alwaysdata.net

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ SelempangKu website monitoring FAILED!"
          echo "URL: https://r4hid2307.alwaysdata.net"
          echo "Check: https://github.com/${{ github.repository }}/actions"